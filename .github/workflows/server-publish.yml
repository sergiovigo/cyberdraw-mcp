name: Server Publish

on:
  release:
    types: created
    paths:
      - 'packages/drawio-mcp-server/**'
      - '.github/workflows/server-publish.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Build compat
        run: pnpm --filter drawio-mcp-compat run build

      - name: Build plugin
        run: pnpm --filter drawio-mcp-plugin run build

      - name: Build dev proxy
        run: pnpm --filter drawio-mcp-dev-proxy run build

      - name: Build server
        run: pnpm --filter drawio-mcp-server run build

      - name: Publish
        run: pnpm --filter drawio-mcp-server publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
