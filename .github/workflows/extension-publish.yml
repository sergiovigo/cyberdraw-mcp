name: Publish Extension

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build compat
        run: pnpm --filter drawio-mcp-compat run build

      - name: Build plugin
        run: pnpm run build
        working-directory: packages/drawio-mcp-plugin

      - name: Build extension (chrome)
        run: pnpm run build
        working-directory: packages/drawio-mcp-extension

      - name: Package extension (chrome)
        run: pnpm run zip
        working-directory: packages/drawio-mcp-extension

      - name: Package extension (firefox)
        run: pnpm run zip:firefox
        working-directory: packages/drawio-mcp-extension
