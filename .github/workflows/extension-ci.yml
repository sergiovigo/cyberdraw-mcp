name: Extension CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/drawio-mcp-extension/**'
      - 'packages/drawio-mcp-plugin/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/drawio-mcp-extension/**'
      - 'packages/drawio-mcp-plugin/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [23.x]

    steps:
      - uses: actions/checkout@v5
      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Audit dependencies
        run: pnpm audit --audit-level=moderate

      - name: Build compat
        run: pnpm --filter drawio-mcp-compat run build

      - name: Build Plugin
        run: pnpm run build
        working-directory: packages/drawio-mcp-plugin

      - name: Build Chrome
        run: pnpm run build
        working-directory: packages/drawio-mcp-extension

      - name: Build Firefox
        run: pnpm run build:firefox
        working-directory: packages/drawio-mcp-extension
